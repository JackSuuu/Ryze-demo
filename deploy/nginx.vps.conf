# nginx config for VPS (frontend + /api/ proxy to local backend)
# Place at: /etc/nginx/sites-available/ryze
# symlink: sudo ln -s /etc/nginx/sites-available/ryze /etc/nginx/sites-enabled/ryze

server {
    listen 80;
    server_name ryze.yourdomain.com;

    root /var/www/ryze;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Frontend static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to local backend
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE / streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        add_header X-Accel-Buffering no;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
