<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioVLM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <button class="new-chat-btn" id="newChatBtn" title="New Chat">
                <i class="fas fa-plus"></i> New Chat
            </button>
            <div class="chat-history" id="chatHistory">
            </div>
        </aside>

        <!-- Main Area -->
        <main class="main-area">
            <!-- Header with panel labels -->
            <header class="panel-header">
                <div class="header-label label-baseline" id="baselineLabel">Baseline</div>
                <div class="header-label label-us">BioVLM</div>
                <button class="settings-btn" id="settingsBtn" title="Settings">
                    <i class="fas fa-gear"></i>
                </button>
            </header>

            <!-- Comparison Panels -->
            <div class="comparison-area" id="comparisonArea">
                <div class="panel" id="panelBaseline">
                    <div class="panel-chat" id="baselineChat">
                        <div class="panel-empty">
                            <i class="fas fa-robot"></i>
                            <span>OpenAI responses appear here</span>
                        </div>
                    </div>
                </div>
                <div class="panel" id="panelUs">
                    <div class="panel-chat" id="usChat">
                        <div class="panel-empty">
                            <i class="fas fa-dna"></i>
                            <span>BioVLM responses appear here</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Bar -->
            <div class="input-bar" id="inputBar">
                <div class="input-bar-inner" id="inputBarInner">
                    <!-- Image preview row (above text) -->
                    <div class="input-preview-row" id="inputPreviewRow" style="display:none;">
                        <div class="input-preview-thumb" id="inlinePreview">
                            <img id="imagePreview" src="" alt="Preview">
                            <button class="remove-preview-btn" id="removeImageBtn"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                    <!-- Text + buttons row -->
                    <div class="input-text-row">
                        <button class="upload-btn" id="uploadBtn" title="Upload image">
                            <i class="fas fa-image"></i>
                        </button>
                        <input
                            type="text"
                            id="messageInput"
                            placeholder="User Input (Support user upload image)"
                            autocomplete="off"
                        >
                        <input type="file" id="imageInput" accept="image/*" style="display:none;">
                        <button class="send-btn" id="sendBtn" disabled>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>
                </div>
                <div class="drop-overlay" id="dropOverlay">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Drop image here</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-cog"></i> Settings</h2>
                <button class="modal-close" id="closeSettings">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label>API Endpoint</label>
                    <input type="text" id="apiEndpoint" value="http://localhost:3001">
                </div>
                <div class="setting-group">
                    <label>OpenAI API Key</label>
                    <input type="password" id="openaiApiKey" placeholder="sk-...">
                </div>
                <div class="setting-group">
                    <label>GPT Model</label>
                    <input type="text" id="gptModel" placeholder="e.g. gpt-4o-mini">
                </div>
                <div class="setting-group">
                    <label>Temperature</label>
                    <div class="slider-container">
                        <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
                        <span id="tempValue">0.7</span>
                    </div>
                </div>
                <div class="setting-group">
                    <label>Max Tokens</label>
                    <input type="number" id="maxTokens" value="2048" min="1" max="8192">
                </div>
                <div class="setting-group">
                    <label>Streaming (BioVLM only)</label>
                    <label class="switch">
                        <input type="checkbox" id="streamMode" checked>
                        <span class="slider-toggle"></span>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="saveSettings">Save</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
</body>
</html>
