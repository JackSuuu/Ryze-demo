<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryze — BioVLM vs GPT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">Ryze</div>
            <button class="new-chat-btn" id="newChatBtn" title="New Chat">
                <i class="fas fa-plus"></i> New Chat
            </button>
            <div class="sidebar-divider"></div>
            <div class="chat-history" id="chatHistory">
            </div>
            <button class="sidebar-nav-item" id="settingsBtn" title="Settings">
                <i class="fas fa-gear"></i> Settings
            </button>
        </aside>

        <!-- Main Area -->
        <main class="main-area">
            <!-- Header -->
            <header class="panel-header">
                <div class="header-mode">
                    <i class="fas fa-columns"></i>
                    <span>Side by Side</span>
                </div>
                <div class="header-models">
                    <div class="model-badge baseline">
                        <i class="fas fa-robot"></i>
                        <span id="baselineLabel">GPT 5 Mini</span>
                    </div>
                    <div class="model-badge biovlm">
                        <i class="fas fa-dna"></i>
                        <span>BioVLM</span>
                    </div>
                </div>
            </header>

            <!-- Chat Area -->
            <div class="chat-area">
                <div class="chat-scroll" id="chatScroll">
                    <div class="empty-state" id="emptyState">
                        <h1>What would you like to compare?</h1>
                        <p>Send a message to see GPT and BioVLM respond side by side.</p>
                    </div>
                </div>
            </div>

            <!-- Input Bar -->
            <div class="input-bar" id="inputBar">
                <div class="input-bar-inner" id="inputBarInner">
                    <!-- Image preview row -->
                    <div class="input-preview-row" id="inputPreviewRow">
                        <div class="drag-drop-placeholder" id="dragDropPlaceholder">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <span>Drop image here</span>
                        </div>
                        <div class="input-preview-thumb" id="inlinePreview">
                            <img id="imagePreview" src="" alt="Preview">
                            <button class="remove-preview-btn" id="removeImageBtn"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                    <!-- Text row -->
                    <div class="input-text-row">
                        <input
                            type="text"
                            id="messageInput"
                            placeholder="Ask anything..."
                            autocomplete="off"
                        >
                        <input type="file" id="imageInput" accept="image/*" style="display:none;">
                    </div>
                    <!-- Toolbar row -->
                    <div class="input-toolbar">
                        <button class="upload-btn" id="uploadBtn" title="Upload image">
                            <i class="fas fa-image"></i>
                        </button>
                        <div class="toolbar-spacer"></div>
                        <button class="send-btn" id="sendBtn" disabled>
                            <i class="fas fa-arrow-up"></i>
                        </button>
                    </div>
                </div>
                <div class="input-disclaimer">Responses may be inaccurate. Verify important information.</div>
                <div class="drop-overlay" id="dropOverlay">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Drop image here</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-cog"></i> Settings</h2>
                <button class="modal-close" id="closeSettings">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label>Temperature</label>
                    <div class="slider-container">
                        <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
                        <span id="tempValue">0.7</span>
                    </div>
                </div>
                <div class="setting-group">
                    <label>Max Tokens</label>
                    <input type="number" id="maxTokens" value="2048" min="1" max="8192">
                </div>
                <div class="setting-group">
                    <label>Streaming</label>
                    <label class="switch">
                        <input type="checkbox" id="streamMode" checked>
                        <span class="slider-toggle"></span>
                    </label>
                </div>
                <div class="settings-divider"></div>
                <div class="setting-section-label">OpenAI BYOK (optional)</div>
                <div class="setting-group">
                    <label>Base URL</label>
                    <input type="text" id="byokBaseUrl" placeholder="https://api.openai.com">
                </div>
                <div class="setting-group">
                    <label>API Key</label>
                    <input type="password" id="byokApiKey" placeholder="sk-...">
                </div>
                <div class="setting-group">
                    <label>Model Name</label>
                    <input type="text" id="byokModelName" placeholder="gpt-4o-mini">
                </div>
                <div class="setting-group">
                    <label>Display Name</label>
                    <input type="text" id="byokDisplayName" placeholder="GPT 5 Mini">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" id="saveSettings">Save</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/app.js"></script>
</body>
</html>
